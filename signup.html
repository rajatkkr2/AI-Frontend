<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>School Management - Student Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-green-50 to-emerald-100 flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-600 rounded-full mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-gray-800">Student Sign Up</h1>
      <p class="text-gray-500 mt-1">Create your student account</p>
    </div>

    <!-- Signup Form Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <form id="signupForm" onsubmit="handleSignup(event)">
        <!-- Error message area -->
        <div id="signupError" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm"></div>

        <!-- Name Field -->
        <div class="mb-4">
          <label for="signupName" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
          <input
            type="text"
            id="signupName"
            placeholder="John Doe"
            required
            minlength="2"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition"
          />
        </div>

        <!-- Email Field -->
        <div class="mb-4">
          <label for="signupEmail" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input
            type="email"
            id="signupEmail"
            placeholder="you@school.com"
            required
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition"
          />
        </div>

        <!-- Password Field -->
        <div class="mb-4">
          <label for="signupPassword" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input
            type="password"
            id="signupPassword"
            placeholder="Min 6 characters"
            required
            minlength="6"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition"
          />
        </div>

        <!-- Confirm Password Field -->
        <div class="mb-6">
          <label for="signupConfirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
          <input
            type="password"
            id="signupConfirmPassword"
            placeholder="Re-enter your password"
            required
            minlength="6"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition"
          />
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          id="signupBtn"
          class="w-full bg-emerald-600 text-white py-2.5 rounded-lg font-medium hover:bg-emerald-700 transition duration-200 focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500"
        >
          Create Account
        </button>
      </form>

      <!-- Login Link -->
      <div class="mt-6 text-center">
        <p class="text-sm text-gray-500">
          Already have an account?
          <a href="/index.html" class="text-emerald-600 font-medium hover:text-emerald-800 transition">Log in here</a>
        </p>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
