<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>School Management System - Login</title>
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">

  <!-- Main Login Card -->
  <div class="w-full max-w-md">
    <!-- Header / Branding -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-full mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-gray-800">School Management</h1>
      <p class="text-gray-500 mt-1">Sign in to your account</p>
    </div>

    <!-- Login Form Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <form id="loginForm" onsubmit="handleLogin(event)">
        <!-- Error message area (hidden by default) -->
        <div id="loginError" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm"></div>

        <!-- Email Field -->
        <div class="mb-4">
          <label for="loginEmail" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input
            type="email"
            id="loginEmail"
            placeholder="you@school.com"
            required
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
          />
        </div>

        <!-- Password Field -->
        <div class="mb-6">
          <label for="loginPassword" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input
            type="password"
            id="loginPassword"
            placeholder="Enter your password"
            required
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
          />
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          id="loginBtn"
          class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-medium hover:bg-indigo-700 transition duration-200 focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
        >
          Log In
        </button>
      </form>

      <!-- Signup Link -->
      <div class="mt-6 text-center">
        <p class="text-sm text-gray-500">
          Student? Don't have an account?
          <a href="/signup.html" class="text-indigo-600 font-medium hover:text-indigo-800 transition">Sign up here</a>
        </p>
      </div>

      <!-- Demo Credentials (helpful for testing) -->
      <div class="mt-6 border-t pt-4">
        <p class="text-xs text-gray-400 text-center mb-2">Demo Credentials</p>
        <div class="grid grid-cols-1 gap-2 text-xs text-gray-500">
          <div class="bg-gray-50 rounded-lg px-3 py-2 flex justify-between">
            <span class="font-medium">Admin:</span>
            <span>admin@school.com / admin123</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>

  <!-- Auto-redirect if already logged in -->
  <script>
    (function () {
      const user = getUser();
      const token = getToken();
      if (token && user) {
        if (user.role === "admin") window.location.href = "/admin/dashboard.html";
        else if (user.role === "teacher") window.location.href = "/teacher/dashboard.html";
        else if (user.role === "student") window.location.href = "/student/dashboard.html";
      }
    })();
  </script>
</body>
</html>
